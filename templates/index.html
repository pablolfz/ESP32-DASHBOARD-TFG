<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estación LoRa UGR</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <div class="logos-container">
                    <img src="/static/images/logo_ugr1.png" alt="UGR" class="header-logo">
                    <img src="/static/images/logo-grupo-labic.png" alt="LABIC" class="header-logo labic-logo">
                </div>
                <span class="header-title">Estación LoRa</span>
            </div>
            <nav class="nav">
                <a href="#" class="nav-link">Temperaturas</a>
                <a href="#seccion-vibraciones" class="nav-link">Vibraciones</a>
                <a href="/api/download_csv" class="btn-csv"><i class="fa-solid fa-file-csv"></i> CSV Temps</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 class="main-title">Estado del Sistema</h1>
        <p class="last-update" id="currentTime">Sincronizando...</p>
        <div class="current-data-grid">
            </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h2>Historial Estación 1</h2>
                <div class="canvas-wrapper"><canvas id="chart1"></canvas></div>
            </div>
            </div>

        <hr>

        <div id="seccion-vibraciones" style="margin-top: 50px;">
            <h1 class="main-title">Análisis de Vibraciones (Piezoeléctrico)</h1>
            <div class="chart-container">
                <div class="chart-toolbar">
                    <button onclick="chartVibraciones.resetZoom()"><i class="fa-solid fa-house"></i></button>
                    <button onclick="descargarCSVVibraciones()" class="btn-csv" style="background:#e74c3c!important">
                        <i class="fa-solid fa-file-arrow-down"></i> Descargar Captura Actual
                    </button>
                    <span style="margin-left:15px; font-weight:bold">5.000 Hz | 5 Segundos (25k muestras)</span>
                </div>
                <div class="canvas-wrapper" style="height: 450px;"><canvas id="chartVibraciones"></canvas></div>
            </div>

            <div class="data-box" style="border-top: 5px solid #e74c3c; margin-top:20px;">
                <h3>Historial de Capturas de Vibración</h3>
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
                    <select id="select-vibraciones" style="padding:10px; border-radius:5px; border:1px solid #ccc; flex-grow:1">
                        <option>Cargando lista...</option>
                    </select>
                    <button onclick="cargarVibracionHistorica()" class="btn-csv" style="background:#34495e!important">Ver Captura Seleccionada</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
