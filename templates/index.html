<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sísmico 4G - TFG</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
</head>
<body>
    <header>
        <h1>Monitorización de Vibraciones Ferroviarias</h1>
        <p id="currentTime">Sincronizando con estación...</p>
    </header>

    <main class="container">
        <section class="grid">
            <div class="card">
                <h3>Estación 1 - Vías</h3>
                <div class="data-summary">
                    <span id="d1-t">--°</span> | <span id="d1-h">--%</span> | <span id="d1-rssi">-- dBm</span>
                </div>
                <div class="chart-container">
                    <canvas id="chart1"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>Estación 2 - Estructura</h3>
                <div class="data-summary">
                    <span id="d2-t">--°</span> | <span id="d2-h">--%</span> | <span id="d2-rssi">-- dBm</span>
                </div>
                <div class="chart-container">
                    <canvas id="chart2"></canvas>
                </div>
            </div>
        </section>

        <section class="card wide">
            <div class="header-vib">
                <h3>Análisis Sísmico (Captura 25,000 pts)</h3>
                <div class="selector">
                    <select id="select-vibraciones" onchange="cargarVibracionHistorica()">
                        <option>Cargando capturas...</option>
                    </select>
                </div>
            </div>
            
            <div class="chart-container-large">
                <canvas id="chartVibraciones"></canvas>
            </div>

            <div class="controles-grafica">
                <button class="btn-ctrl" onclick="controlGrafica('left')">◀ Izquierda</button>
                <button class="btn-ctrl" onclick="controlGrafica('in')">➕ Zoom In</button>
                <button class="btn-ctrl" onclick="controlGrafica('out')">➖ Zoom Out</button>
                <button class="btn-ctrl" onclick="controlGrafica('right')">Derecha ▶</button>
                <button class="btn-ctrl" onclick="controlGrafica('reset')">🔄 Reset</button>
            </div>
        </section>
    </main>

    <div id="modal-visor" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="titulo-visor">Visor Detallado</h2>
                <span class="close" onclick="cerrarVisor()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="chart-container-modal">
                    <canvas id="chartModal"></canvas>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ctrl" onclick="controlGrafica('left')">◀</button>
                <button class="btn-ctrl" onclick="controlGrafica('in')">➕</button>
                <button class="btn-ctrl" onclick="controlGrafica('out')">➖</button>
                <button class="btn-ctrl" onclick="controlGrafica('right')">▶</button>
                <button class="btn-ctrl" onclick="controlGrafica('reset')">Reset</button>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
