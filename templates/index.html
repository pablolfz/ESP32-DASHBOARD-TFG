<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <div class="logos-container">
                    <img src="static/images/logo_ugr.png" class="header-logo">
                    <img src="static/images/logo-grupo-labic.png" class="header-logo">
                    <div class="header-title">Dashboard</div>
                </div>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link">Temperatura</a>
                <a href="#seccion-piezo" class="nav-link">Piezoeléctrico</a>
                <a href="/api/download_csv" class="btn-csv"><i class="fa-solid fa-file-csv"></i> CSV Temperaturas</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 class="main-title">Estado del Sistema (Tiempo Real)</h1>
        <p class="last-update" id="currentTime">Sincronizando...</p>

        <div class="current-data-grid">
            <div class="data-box" id="box-env">
                <h3>Ambiente <i class="fa-solid fa-cloud-sun"></i></h3>
                <div class="env-table">
                    <div class="env-row header-row"><span>ID</span><span>Temp.</span><span>Hum.</span></div>
                    <div class="env-row"><span>E1</span><span><b id="d1-t">--</b> °C</span><span><b id="d1-h">--</b> %</span></div>
                    <div class="env-row"><span>E2</span><span><b id="d2-t">--</b> °C</span><span><b id="d2-h">--</b> %</span></div>
                    <div class="env-row"><span>E3</span><span><b id="d3-t">--</b> °C</span><span><b id="d3-h">--</b> %</span></div>
                </div>
            </div>
            </div>

        <div class="chart-container">
            <h2>Historial Estación 1</h2>
            <div class="chart-toolbar">
                <button onclick="chart1.resetZoom()"><i class="fa-solid fa-house"></i></button>
                <button onclick="descargarImagen(chart1, 'E1')"><i class="fa-solid fa-camera"></i></button>
            </div>
            <div class="canvas-wrapper" onclick="abrirMaxivisor(chart1, 'Estación 1')"><canvas id="chart1"></canvas></div>
        </div>

        <div id="seccion-piezo">
            <h1 class="main-title">Análisis de medidas (Piezoeléctrico)</h1>
            <div class="chart-container">
                <div class="chart-toolbar">
                    <button onclick="chartVibraciones.resetZoom()"><i class="fa-solid fa-house"></i></button>
                    <button onclick="descargarImagen(chartVibraciones, 'Piezo')"><i class="fa-solid fa-camera"></i></button>
                    <button onclick="descargarCSVVibracion()" class="btn-csv" style="background:#e67e22!important"><i class="fa-solid fa-file-csv"></i> Descargar CSV Muestra</button>
                </div>
                <div class="canvas-wrapper" style="height:500px;" onclick="abrirMaxivisor(chartVibraciones, 'Sensor Piezoeléctrico')"><canvas id="chartVibraciones"></canvas></div>
            </div>
        </div>
    </div>

    <div id="modal-visor" class="modal">
        <span class="close-modal" onclick="cerrarVisor()">&times;</span>
        <div class="modal-content">
            <div class="chart-toolbar">
                <button onclick="chartModal.resetZoom()"><i class="fa-solid fa-house"></i></button>
                <button onclick="moveChart(chartModal, -0.1)"><i class="fa-solid fa-arrow-left"></i></button>
                <button onclick="moveChart(chartModal, 0.1)"><i class="fa-solid fa-arrow-right"></i></button>
                <span id="titulo-visor"></span>
            </div>
            <div class="canvas-wrapper-modal"><canvas id="chartModal"></canvas></div>
        </div>
    </div>
    <script src="static/js/dashboard.js"></script>
</body>
</html>
